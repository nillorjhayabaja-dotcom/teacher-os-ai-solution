# =============================================================================
# TeacherOS - Grafana Datasources
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://teacheros-prometheus:9090
    isDefault: true
    editable: false
    version: 1
    jsonData:
      timeInterval: 15s
      queryTimeout: 30s
      httpMethod: POST
      manageAlerts: true

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: teacheros-postgres:5432
    user: teacheros
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: teacheros
      schema: public
      sslmode: disable
      tlsSkipVerify: true
      timeInterval: 30s
    editable: false
    version: 1

  - name: Loki
    type: loki
    access: proxy
    url: http://teacheros-loki:3100
    isDefault: false
    editable: false
    version: 1
    jsonData:
      timeout: 30s
      maxLines: 1000

  - name: Tempo
    type: tempo
    access: proxy
    url: http://teacheros-tempo:3200
    isDefault: false
    editable: false
    version: 1
    jsonData:
      tracesToLogs:
        datasourceUid: loki
        tags: ['service.name', 'span.name']
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true