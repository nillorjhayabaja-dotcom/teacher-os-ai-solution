# =============================================================================
# TeacherOS - Nginx Reverse Proxy Configuration
# =============================================================================

# Run as non-root user
user nginx;

# Auto-detect worker processes
worker_processes auto;
worker_rlimit_nofile 65535;

# Error log
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# =============================================================================
# Events
# =============================================================================
events {
    worker_connections 10240;
    multi_accept on;
    use epoll;
}

# =============================================================================
# HTTP
# =============================================================================
http {
    # =========================================================================
    # Basic Settings
    # =========================================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Character set
    charset utf-8;

    # File upload size
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 30s;
    send_timeout 60s;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # TCP optimization
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    directio 4m;

    # =========================================================================
    # Logging
    # =========================================================================
    log_format json escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"http_x_request_id":"$http_x_request_id",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time",'
        '"ssl_protocol":"$ssl_protocol",'
        '"ssl_cipher":"$ssl_cipher"'
    '}';

    access_log /var/log/nginx/access.log json buffer=32k flush=5s;

    # =========================================================================
    # Compression
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        image/webp
        font/woff
        font/woff2;

    # =========================================================================
    # Security Headers
    # =========================================================================
    # Hide Nginx version
    server_tokens off;

    # Security headers map
    map $upstream_http_content_security_policy $content_security_policy {
        default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https: wss:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'";
        ~. $upstream_http_content_security_policy;
    }

    # =========================================================================
    # Rate Limiting Zones
    # =========================================================================
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=ai:10m rate=20r/m;

    # =========================================================================
    # Upstream Backends
    # =========================================================================
    upstream teacheros-frontend {
        server teacheros-frontend:3000;
        keepalive 32;
    }

    upstream teacheros-api {
        server teacheros-api:8000;
        keepalive 32;
    }

    upstream teacheros-ws {
        server teacheros-api:8000;
        keepalive 32;
    }

    upstream teacheros-minio {
        server teacheros-storage:9000;
        keepalive 16;
    }

    upstream teacheros-pgadmin {
        server teacheros-pgadmin:5050;
        keepalive 16;
    }

    # =========================================================================
    # HTTPS Server (Production)
    # =========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name teacheros.ph app.teacheros.ph api.teacheros.ph;

        # SSL certificates (mounted as volume or from certbot)
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Include common security headers
        include /etc/nginx/security-headers.conf;

        # =====================================================================
        # Location Blocks
        # =====================================================================

        # Health check endpoint (no rate limiting)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # API routing
        location /api/ {
            proxy_pass http://teacheros-api;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 8k;
            proxy_busy_buffers_size 16k;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;

            # Rate limiting
            limit_req zone=api burst=200 nodelay;
        }

        # WebSocket routing (for real-time features)
        location /ws/ {
            proxy_pass http://teacheros-ws;
            proxy_http_version 1.1;

            # WebSocket-specific headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;

            # WebSocket timeouts
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Frontend routing
        location / {
            proxy_pass http://teacheros-frontend;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;

            # Caching for static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://teacheros-frontend;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;

                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            # HTML files (no caching)
            location ~* \.(html)$ {
                proxy_pass http://teacheros-frontend;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;

                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }

        # MinIO console (admin only)
        location /minio/ {
            proxy_pass http://teacheros-minio;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # MinIO requires specific headers
            proxy_set_header X-Forwarded-Proto $scheme;

            # Upload size limit
            client_max_body_size 100M;
        }
    }

    # =========================================================================
    # HTTP Server (Redirect to HTTPS in production)
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name teacheros.ph app.teacheros.ph api.teacheros.ph;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # Development HTTP Server (no SSL)
    # =========================================================================
    server {
        listen 80 default_server;
        server_name localhost;

        # Include security headers
        include /etc/nginx/security-headers.conf;

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # API routing
        location /api/ {
            proxy_pass http://teacheros-api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_buffering off;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;
        }

        # WebSocket routing
        location /ws/ {
            proxy_pass http://teacheros-ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        # Frontend routing
        location / {
            proxy_pass http://teacheros-frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Static asset caching
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://teacheros-frontend;
                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }
    }
}