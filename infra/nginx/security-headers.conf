# =============================================================================
# TeacherOS - Nginx Security Headers
# =============================================================================
# Include this file in all server blocks
# =============================================================================

# HSTS (only enable if HTTPS is configured)
# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# XSS Protection
add_header X-XSS-Protection "1; mode=block" always;

# Clickjacking Protection
add_header X-Frame-Options "SAMEORIGIN" always;

# MIME-type Sniffing Protection
add_header X-Content-Type-Options "nosniff" always;

# Referrer Policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

# Content Security Policy
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https: wss:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

# Cross-Origin Resource Policy
add_header Cross-Origin-Resource-Policy "same-origin" always;

# Cross-Origin Opener Policy
add_header Cross-Origin-Opener-Policy "same-origin" always;

# Cross-Origin Embedder Policy
add_header Cross-Origin-Embedder-Policy "require-corp" always;