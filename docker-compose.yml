# =============================================================================
# TeacherOS - Docker Compose (Main)
# =============================================================================
# One-command startup: docker compose up -d
# Profile-based: docker compose --profile ai up -d
# =============================================================================

name: teacheros

# =============================================================================
# Networks
# =============================================================================
networks:
  frontend-network:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    labels:
      com.teacheros.network: "frontend"

  backend-network:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.24.0.0/16
    labels:
      com.teacheros.network: "backend"

  monitoring-network:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.25.0.0/16
    labels:
      com.teacheros.network: "monitoring"

  storage-network:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.26.0.0/16
    labels:
      com.teacheros.network: "storage"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      device: ${PWD}/data/postgres
      o: bind
    labels:
      com.teacheros.volume: "postgres_data"

  redis_data:
    driver: local
    driver_opts:
      type: none
      device: ${PWD}/data/redis
      o: bind
    labels:
      com.teacheros.volume: "redis_data"

  minio_data:
    driver: local
    driver_opts:
      type: none
      device: ${PWD}/data/minio
      o: bind
    labels:
      com.teacheros.volume: "minio_data"

  grafana_data:
    driver: local
    driver_opts:
      type: none
      device: ${PWD}/data/grafana
      o: bind
    labels:
      com.teacheros.volume: "grafana_data"

  prometheus_data:
    driver: local
    driver_opts:
      type: none
      device: ${PWD}/data/prometheus
      o: bind
    labels:
      com.teacheros.volume: "prometheus_data"

  uploads_data:
    driver: local
    driver_opts:
      type: none
      device: ${PWD}/data/uploads
      o: bind
    labels:
      com.teacheros.volume: "uploads_data"

  nginx_logs:
    driver: local
    driver_opts:
      type: none
      device: ${PWD}/data/logs/nginx
      o: bind

  api_logs:
    driver: local
    driver_opts:
      type: none
      device: ${PWD}/data/logs/api
      o: bind

  worker_logs:
    driver: local
    driver_opts:
      type: none
      device: ${PWD}/data/logs/worker
      o: bind

  backup_data:
    driver: local
    driver_opts:
      type: none
      device: ${PWD}/data/backups
      o: bind

# =============================================================================
# Services
# =============================================================================
services:
  # ===========================================================================
  # Reverse Proxy
  # ===========================================================================
  teacheros-proxy:
    image: nginx:1.26-alpine
    container_name: teacheros-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
      - nginx_logs:/var/log/nginx
      - ./data/certbot/conf:/etc/nginx/ssl:ro
      - ./data/certbot/www:/var/www/certbot:ro
    networks:
      - frontend-network
    depends_on:
      teacheros-frontend:
        condition: service_healthy
      teacheros-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      com.teacheros.service: "proxy"
      com.teacheros.environment: "${APP_ENVIRONMENT:-development}"

  # ===========================================================================
  # Frontend (Next.js)
  # ===========================================================================
  teacheros-frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: production
      args:
        ENVIRONMENT: ${APP_ENVIRONMENT:-production}
    image: teacheros-frontend:${IMAGE_TAG:-latest}
    container_name: teacheros-frontend
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - uploads_data:/app/public/uploads:ro
    env_file:
      - .env.${APP_ENVIRONMENT:-production}
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_WS_URL=/ws
    networks:
      - frontend-network
    depends_on:
      teacheros-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      com.teacheros.service: "frontend"
      com.teacheros.environment: "${APP_ENVIRONMENT:-production}"

  # ===========================================================================
  # Backend API (FastAPI)
  # ===========================================================================
  teacheros-api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    image: teacheros-api:${IMAGE_TAG:-latest}
    container_name: teacheros-api
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./keys:/app/keys:ro
    env_file:
      - .env.${APP_ENVIRONMENT:-production}
    environment:
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-production}
    networks:
      - frontend-network
      - backend-network
      - monitoring-network
    depends_on:
      teacheros-postgres:
        condition: service_healthy
      teacheros-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs
      - /app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      com.teacheros.service: "api"
      com.teacheros.environment: "${APP_ENVIRONMENT:-production}"

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  teacheros-postgres:
    image: pgvector/pgvector:pg17
    container_name: teacheros-postgres
    restart: unless-stopped
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    env_file:
      - .env.${APP_ENVIRONMENT:-production}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-teacheros}
      - POSTGRES_USER=${POSTGRES_USER:-teacheros}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-teacheros_password}
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teacheros} -d ${POSTGRES_DB:-teacheros}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    shm_size: 256mb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.teacheros.service: "postgres"
      com.teacheros.environment: "${APP_ENVIRONMENT:-production}"

  # ===========================================================================
  # Redis
  # ===========================================================================
  teacheros-redis:
    image: redis:7.4-alpine
    container_name: teacheros-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.teacheros.service: "redis"
      com.teacheros.environment: "${APP_ENVIRONMENT:-production}"

  # ===========================================================================
  # Celery Worker
  # ===========================================================================
  teacheros-worker:
    build:
      context: .
      dockerfile: docker/celery/Dockerfile
      target: production
    image: teacheros-worker:${IMAGE_TAG:-latest}
    container_name: teacheros-worker
    restart: unless-stopped
    volumes:
      - worker_logs:/app/logs
      - uploads_data:/app/uploads
      - ./keys:/app/keys:ro
    env_file:
      - .env.${APP_ENVIRONMENT:-production}
    environment:
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-production}
    networks:
      - backend-network
      - storage-network
      - monitoring-network
    depends_on:
      teacheros-postgres:
        condition: service_healthy
      teacheros-redis:
        condition: service_healthy
      teacheros-storage:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      com.teacheros.service: "worker"
      com.teacheros.environment: "${APP_ENVIRONMENT:-production}"

  # ===========================================================================
  # Celery Beat (Scheduler)
  # ===========================================================================
  teacheros-scheduler:
    build:
      context: .
      dockerfile: docker/celery/Dockerfile
      target: production
    image: teacheros-scheduler:${IMAGE_TAG:-latest}
    container_name: teacheros-scheduler
    restart: unless-stopped
    volumes:
      - worker_logs:/app/logs
    env_file:
      - .env.${APP_ENVIRONMENT:-production}
    environment:
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-production}
    command: >
      celery -A backend.src.tasks.celery_app beat
      --loglevel=info
      --scheduler=django_celery_beat.schedulers:DatabaseScheduler
      --pidfile=/tmp/celerybeat.pid
    networks:
      - backend-network
    depends_on:
      teacheros-postgres:
        condition: service_healthy
      teacheros-redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.teacheros.service: "scheduler"
      com.teacheros.environment: "${APP_ENVIRONMENT:-production}"

  # ===========================================================================
  # MinIO (S3-compatible Storage)
  # ===========================================================================
  teacheros-storage:
    image: minio/minio:latest
    container_name: teacheros-storage
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    env_file:
      - .env.${APP_ENVIRONMENT:-production}
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-teacheros_admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-teacheros_minio_password}
      - MINIO_DOMAIN=teacheros-storage
    command: server /data --console-address ":9001"
    networks:
      - storage-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.teacheros.service: "storage"
      com.teacheros.environment: "${APP_ENVIRONMENT:-production}"

  # ===========================================================================
  # MinIO Client (Setup Buckets)
  # ===========================================================================
  teacheros-storage-setup:
    image: minio/mc:latest
    container_name: teacheros-storage-setup
    depends_on:
      teacheros-storage:
        condition: service_healthy
    env_file:
      - .env.${APP_ENVIRONMENT:-production}
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-teacheros_admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-teacheros_minio_password}
    entrypoint: |
      /bin/sh -c "
      until (/usr/bin/mc alias set teacheros http://teacheros-storage:9000 ${MINIO_ROOT_USER:-teacheros_admin} ${MINIO_ROOT_PASSWORD:-teacheros_minio_password}); do
        echo 'Waiting for MinIO...'
        sleep 2
      done;
      /usr/bin/mc mb -p teacheros/teacheros-uploads || true;
      /usr/bin/mc mb -p teacheros/teacheros-reports || true;
      /usr/bin/mc mb -p teacheros/teacheros-ai-outputs || true;
      /usr/bin/mc mb -p teacheros/teacheros-pdfs || true;
      /usr/bin/mc policy set download teacheros/teacheros-uploads || true;
      /usr/bin/mc policy set download teacheros/teacheros-reports || true;
      echo 'MinIO buckets created successfully';
      exit 0;
      "
    networks:
      - storage-network
    restart: "no"
    labels:
      com.teacheros.service: "storage-setup"

  # ===========================================================================
  # Database Initialization (Alembic Migrations + Seeds)
  # ===========================================================================
  teacheros-db-init:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    container_name: teacheros-db-init
    depends_on:
      teacheros-postgres:
        condition: service_healthy
    env_file:
      - .env.${APP_ENVIRONMENT:-production}
    environment:
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-production}
    command: >
      sh -c "
      alembic upgrade head &&
      echo 'Migrations complete' &&
      python -c \"
        import os, secrets
        from backend.src.infrastructure.database import SessionLocal;
        from backend.src.domains.auth.models import User;
        from backend.src.security.password_service import PasswordService;
        db = SessionLocal();
        admin = db.query(User).filter(User.email == 'admin@teacheros.ph').first();
        if not admin:
          admin_password = os.environ.get('ADMIN_INITIAL_PASSWORD') or secrets.token_urlsafe(24);
          ps = PasswordService();
          admin = User(
            email='admin@teacheros.ph',
            username='admin',
            role='super_admin',
            is_active=True,
            is_verified=True,
            tenant_id='00000000-0000-0000-0000-000000000001'
          );
          admin.password_hash = ps.hash_password(admin_password);
          db.add(admin);
          db.commit();
          print(f'Admin user created - temporary password: {admin_password}');
          print('IMPORTANT: Change this password on first login or via ADMIN_INITIAL_PASSWORD env var');
      \" || true;
      echo 'Database initialization complete'
      "
    networks:
      - backend-network
    restart: "no"
    labels:
      com.teacheros.service: "db-init"

  # ===========================================================================
  # Prometheus
  # ===========================================================================
  teacheros-prometheus:
    image: prom/prometheus:v3.2.1
    container_name: teacheros-prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.teacheros.service: "prometheus"
      com.teacheros.environment: "${APP_ENVIRONMENT:-production}"

  # ===========================================================================
  # Grafana
  # ===========================================================================
  teacheros-grafana:
    image: grafana/grafana:11.5.2
    container_name: teacheros-grafana
    restart: unless-stopped
    expose:
      - "3001"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    env_file:
      - .env.${APP_ENVIRONMENT:-production}
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-teacheros_grafana_admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_HTTP_PORT=3000
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    networks:
      - monitoring-network
    depends_on:
      teacheros-prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.teacheros.service: "grafana"
      com.teacheros.environment: "${APP_ENVIRONMENT:-production}"

  # ===========================================================================
  # PostgreSQL Exporter
  # ===========================================================================
  teacheros-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.0
    container_name: teacheros-postgres-exporter
    restart: unless-stopped
    expose:
      - "9187"
    env_file:
      - .env.${APP_ENVIRONMENT:-production}
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-teacheros}:${POSTGRES_PASSWORD:-teacheros_password}@teacheros-postgres:5432/${POSTGRES_DB:-teacheros}?sslmode=disable
    networks:
      - backend-network
      - monitoring-network
    depends_on:
      teacheros-postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.teacheros.service: "postgres-exporter"

  # ===========================================================================
  # Redis Exporter
  # ===========================================================================
  teacheros-redis-exporter:
    image: oliver006/redis_exporter:v1.69.0
    container_name: teacheros-redis-exporter
    restart: unless-stopped
    expose:
      - "9121"
    environment:
      - REDIS_ADDR=redis://teacheros-redis:6379
    networks:
      - backend-network
      - monitoring-network
    depends_on:
      teacheros-redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    labels:
      com.teacheros.service: "redis-exporter"

  # ===========================================================================
  # PostgreSQL Backup Service
  # ===========================================================================
  teacheros-backup-postgres:
    image: prodrigestivill/postgres-backup-local:17
    container_name: teacheros-backup-postgres
    restart: unless-stopped
    volumes:
      - backup_data:/backups
    env_file:
      - .env.${APP_ENVIRONMENT:-production}
    environment:
      - POSTGRES_HOST=teacheros-postgres
      - POSTGRES_DB=${POSTGRES_DB:-teacheros}
      - POSTGRES_USER=${POSTGRES_USER:-teacheros}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-teacheros_password}
      - SCHEDULE=@daily
      - BACKUP_DIR=/backups/postgres
      - BACKUP_KEEP_DAYS=30
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=3
      - HEALTHCHECK_PORT=8080
    networks:
      - backend-network
    depends_on:
      teacheros-postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - backup
    labels:
      com.teacheros.service: "backup-postgres"

# =============================================================================
# AI Infrastructure (Optional - requires --profile ai)
# =============================================================================
  # ===========================================================================
  # Ollama (Local AI)
  # ===========================================================================
  teacheros-ollama:
    image: ollama/ollama:latest
    container_name: teacheros-ollama
    restart: unless-stopped
    expose:
      - "11434"
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - backend-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - ai
    labels:
      com.teacheros.service: "ollama"
      com.teacheros.profile: "ai"

  # ===========================================================================
  # Open WebUI (AI Chat Interface)
  # ===========================================================================
  teacheros-openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: teacheros-openwebui
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./data/openwebui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://teacheros-ollama:11434
      - WEBUI_NAME=TeacherOS AI
      - WEBUI_URL=http://localhost:3000
    networks:
      - backend-network
    depends_on:
      - teacheros-ollama
    profiles:
      - ai
    labels:
      com.teacheros.service: "openwebui"
      com.teacheros.profile: "ai"