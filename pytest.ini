[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -ra
    --strict-markers
    --strict-config

markers =
    unit: fast unit tests with no external dependencies
    domain: domain rule and model tests
    integration: integration tests using application/infrastructure boundaries
    api: HTTP and OpenAPI contract tests
    workflows: workflow state machine tests
    events: event bus/store/replay tests
    agents: AI agent tests
    tools: AI tool registry and execution tests
    rag: retrieval augmented generation pipeline tests
    security: authentication, authorization, tenant isolation, and audit tests
    performance: bounded latency/memory smoke benchmarks
    contract: schema and backward compatibility tests
    observability: logging, metrics, tracing, and health tests
    celery: task queue tests
    document_pipeline: upload/OCR/extraction/AI analysis tests
    xfail_architecture_gap: executable compliance check for documented architecture not yet implemented
filterwarnings =
    ignore::DeprecationWarning
