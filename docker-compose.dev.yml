# =============================================================================
# TeacherOS - Docker Compose (Development Override)
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# =============================================================================

name: teacheros-dev

# =============================================================================
# Services
# =============================================================================
services:
  # ===========================================================================
  # Reverse Proxy (Development)
  # ===========================================================================
  teacheros-proxy:
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
    depends_on:
      teacheros-frontend:
        condition: service_started
      teacheros-api:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Frontend (Development - Hot Reload)
  # ===========================================================================
  teacheros-frontend:
    build:
      target: development
    container_name: teacheros-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reload
      - ./frontend:/app/frontend
      - ./package.json:/app/package.json
      - ./bun.lock:/app/bun.lock
      - ./bunfig.toml:/app/bunfig.toml
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./components.json:/app/components.json
      - ./eslint.config.js:/app/eslint.config.js
      - uploads_data:/app/public/uploads
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_WS_URL=ws://localhost/ws
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    read_only: false
    tmpfs:
      - /tmp
      - /app/.next
      - /app/node_modules/.cache

  # ===========================================================================
  # Backend API (Development - Auto Reload)
  # ===========================================================================
  teacheros-api:
    build:
      target: development
    container_name: teacheros-api-dev
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot reload
      - ./backend:/app/backend
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./keys:/app/keys
      - ./data/uploads:/app/uploads
      - ./data/logs/api:/app/logs
    environment:
      - APP_ENVIRONMENT=development
      - APP_DEBUG=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=
    command: >
      uvicorn backend.src.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app
      --log-level debug
      --access-log
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ===========================================================================
  # PostgreSQL (Development)
  # ===========================================================================
  teacheros-postgres:
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teacheros} -d ${POSTGRES_DB:-teacheros}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ===========================================================================
  # Redis (Development)
  # ===========================================================================
  teacheros-redis:
    ports:
      - "6379:6379"

  # ===========================================================================
  # Celery Worker (Development - Auto Reload)
  # ===========================================================================
  teacheros-worker:
    build:
      target: development
    container_name: teacheros-worker-dev
    volumes:
      - ./backend:/app/backend
      - ./keys:/app/keys
      - ./data/uploads:/app/uploads
      - ./data/logs/worker:/app/logs
    environment:
      - APP_ENVIRONMENT=development
      - APP_DEBUG=true
    command: >
      watchfiles
      "celery -A backend.src.tasks.celery_app worker
      --loglevel=debug
      --concurrency=2
      --max-tasks-per-child=50
      --pool=prefork
      --uid=teacheros
      --events"
      /app/backend

  # ===========================================================================
  # Celery Beat (Development)
  # ===========================================================================
  teacheros-scheduler:
    container_name: teacheros-scheduler-dev
    volumes:
      - ./backend:/app/backend
    command: >
      celery -A backend.src.tasks.celery_app beat
      --loglevel=debug
      --scheduler=celery.beat.PersistentScheduler
      --pidfile=/tmp/celerybeat.pid

  # ===========================================================================
  # MinIO (Development)
  # ===========================================================================
  teacheros-storage:
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin

  # ===========================================================================
  # pgAdmin (Development Only)
  # ===========================================================================
  teacheros-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: teacheros-pgadmin
    restart: unless-stopped
    ports:
      - "5050:5050"
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
    env_file:
      - .env.development
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL:-admin@teacheros.ph}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD:-teacheros_pgadmin_password}
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    networks:
      - frontend-network
      - backend-network
    depends_on:
      teacheros-postgres:
        condition: service_healthy
    profiles:
      - devtools
    labels:
      com.teacheros.service: "pgadmin"
      com.teacheros.profile: "devtools"

  # ===========================================================================
  # Database Initialization (Development)
  # ===========================================================================
  teacheros-db-init:
    container_name: teacheros-db-init-dev
    volumes:
      - ./backend:/app/backend
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    environment:
      - APP_ENVIRONMENT=development
      - APP_DEBUG=true
    command: >
      sh -c "
      alembic upgrade head &&
      echo 'Migrations complete' &&
      python -c \"
        from backend.src.domains.auth.models import User;
        from backend.src.infrastructure.database import SessionLocal;
        db = SessionLocal();
        admin = db.query(User).filter(User.email == 'admin@teacheros.ph').first();
        if not admin:
          from backend.src.security.auth_service import AuthService;
          auth_service = AuthService();
          admin = User(
            email='admin@teacheros.ph',
            username='admin',
            role='super_admin',
            is_active=True,
            is_verified=True,
            tenant_id='00000000-0000-0000-0000-000000000001'
          );
          admin.password_hash = auth_service.hash_password('Admin123!@#');
          db.add(admin);
          db.commit();
          print('Admin user created');
        print('Database initialization complete');
      \"
      "

  # ===========================================================================
  # Mailpit (Development Email Testing)
  # ===========================================================================
  teacheros-mailpit:
    image: axllent/mailpit:latest
    container_name: teacheros-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - backend-network
    profiles:
      - devtools
    labels:
      com.teacheros.service: "mailpit"
      com.teacheros.profile: "devtools"

  # ===========================================================================
  # Adminer (Development Database Manager)
  # ===========================================================================
  teacheros-adminer:
    image: adminer:latest
    container_name: teacheros-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - frontend-network
      - backend-network
    depends_on:
      teacheros-postgres:
        condition: service_healthy
    profiles:
      - devtools
    labels:
      com.teacheros.service: "adminer"
      com.teacheros.profile: "devtools"